<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamiski - お子様向けタイマー</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-black text-neon-white overflow-hidden">
  <div id="app" class="relative w-full h-screen overflow-hidden flex flex-col">
    
    <!-- 点滅用オーバーレイ -->
    <div id="flash-overlay" class="fixed inset-0 pointer-events-none opacity-0 z-50 transition-opacity duration-100"></div>

    <!-- スタート画面 -->
    <div id="screen-start" class="screen active flex flex-col items-center justify-center gap-12 p-8 relative">
      <div id="start-bg" class="absolute inset-0 z-0 opacity-60"></div>
      <h1 class="logo-text neon-pink text-6xl md:text-8xl relative z-10">Kamiski</h1>
      <button id="btn-goto-timer" class="neon-btn neon-pink-border text-4xl px-16 py-8 rounded-full relative z-10">はじめる</button>
      <button id="btn-goto-settings" class="neon-btn neon-green-border text-2xl px-8 py-4 rounded-full mt-4 relative z-10">せってい</button>
    </div>

    <!-- タイマー画面 -->
    <div id="screen-timer" class="screen flex flex-col items-center justify-between py-8 px-4 h-full">
      <!-- 上部進行バー -->
      <div class="progress-container w-full h-8 bg-gray-900 rounded-full overflow-hidden neon-white-border">
        <div id="progress-bar" class="h-full bg-neon-green w-full"></div>
      </div>

      <!-- アニメーション/動画エリア -->
      <div id="animation-area" class="flex-grow flex items-center justify-center w-full max-h-40vh my-4 relative overflow-hidden">
        <div id="placeholder-text" class="text-gray-600 text-xl border-2 border-dashed border-gray-700 p-8 rounded-lg">あにめーしょん</div>
        <video id="timer-video" class="hidden w-full h-full object-contain" loop muted playsinline></video>
        <img id="celebration-img" class="hidden object-contain drop-shadow-neon" src="" alt="おめでとう">
      </div>

      <!-- デジタルタイマー表示 -->
      <div id="timer-display" class="font-mono text-8xl md:text-9xl neon-yellow">00:00</div>

      <!-- 操作ボタンエリア -->
      <div id="timer-controls" class="flex justify-center items-center gap-8 w-full px-4 mb-4">
        <button id="btn-start-timer" class="neon-btn neon-green-border text-4xl px-16 py-8 rounded-full">スタート</button>
        <button id="btn-retry-timer" class="hidden neon-btn neon-pink-border text-2xl px-8 py-4 rounded-full">もういっかい</button>
      </div>

      <!-- 終了時ボタン -->
      <button id="btn-stop-alert" class="hidden neon-btn-flash neon-white-border bg-white text-black text-5xl px-20 py-10 rounded-full z-40">とめる</button>
    </div>

    <!-- 設定画面 -->
    <div id="screen-settings" class="screen flex flex-col items-center justify-start p-8 gap-8 overflow-y-auto">
      <h2 class="text-4xl neon-green">せってい</h2>
      
      <div class="settings-group w-full max-w-lg flex flex-col gap-4">
        <h3 class="text-2xl neon-yellow">タイマーのじかん</h3>
        <div id="timer-duration-options" class="grid grid-cols-3 gap-4">
          <label class="neon-radio-label"><input type="radio" name="timer-duration" value="20"> 20秒</label>
          <label class="neon-radio-label"><input type="radio" name="timer-duration" value="30"> 30秒</label>
          <label class="neon-radio-label"><input type="radio" name="timer-duration" value="60"> 1分</label>
          <label class="neon-radio-label"><input type="radio" name="timer-duration" value="120"> 2分</label>
          <label class="neon-radio-label"><input type="radio" name="timer-duration" value="180"> 3分</label>
          <label class="neon-radio-label"><input type="radio" name="timer-duration" value="300"> 5分</label>
        </div>
      </div>

      <div class="settings-group w-full max-w-lg flex flex-col gap-4">
        <h3 class="text-2xl neon-pink">おと</h3>
        <div class="flex flex-col gap-2">
          <button id="audio-record" class="neon-btn-simple">声をろくおんする</button>
          <input type="file" id="audio-upload" accept="audio/*" class="hidden">
          <button id="audio-upload-btn" class="neon-btn-simple">ファイルからえらぶ</button>
          <div id="audio-status" class="text-sm text-gray-400">じょうたい: デフォルトチャイム</div>
        </div>
      </div>

      <div class="settings-group w-full max-w-lg flex flex-col gap-4">
        <h3 class="text-2xl neon-white">てんめつ がぞう</h3>
        <div class="grid grid-cols-2 gap-2">
          <div id="preset-img-1" class="img-preview border-2 border-neon-pink p-1 cursor-pointer">
            <img src="" class="w-full h-20 object-cover" id="thumb-1">
            <span class="text-xs">がぞう1</span>
          </div>
          <div id="preset-img-2" class="img-preview border-2 border-neon-green p-1 cursor-pointer">
            <img src="" class="w-full h-20 object-cover" id="thumb-2">
            <span class="text-xs">がぞう2</span>
          </div>
        </div>
      </div>

      <button id="btn-back-to-start" class="neon-btn neon-white-border text-2xl px-12 py-4 rounded-full mt-4">もどる</button>
    </div>

  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
